      content="width=device-width, initial-scale=1.0">

<title>
Study Time Calculator | Atlas Toolkit
</title>

<meta name="description"
content="Estimate how many hours you should study each day or week based on your courses, exam date, and target grade using Atlas Toolkit's free Study Time Calculator.">

<link rel="icon"
type="image/png"
href="../../assets/images/favicon-288x288.png">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

rel="stylesheet">

href="../../css/style.css">

<body>

<div id="navbar-container"></div>

<div class="app">

<!-- HERO -->

<section class="hero">

<h1>

Study Time Calculator

</h1>

<p>

Estimate how many hours you should study each day to reach your academic goals.

</p>

</section>

<!-- CALCULATOR -->

<section class="card">

<!-- Credits -->

<div class="field">

<label>Credit Hours</label>

<div class="input-group">

<input
id="credits"
type="number"
placeholder="e.g. 4">

</div>

</div>

<!-- Difficulty -->

<div class="field">

<label>Course Difficulty</label>

<select id="difficulty">

<option value="1">Easy</option>
<option value="1.25" selected>Medium</option>
<option value="1.5">Hard</option>

</select>

</div>

<!-- Current Grade -->

<div class="field">

<label>Current Grade</label>

<div class="input-group">

<input
id="current"
type="number"
placeholder="e.g. 84">

<span>%</span>

</div>

</div>

<!-- Target Grade -->

<div class="field">

<label>Target Grade</label>

<div class="input-group">

<input
id="target"
type="number"
placeholder="e.g. 90">

<span>%</span>

</div>

</div>

<!-- Days Until Exam -->

<div class="field">

<label>Days Until Exam</label>

<div class="input-group">

<input
id="days"
type="number"
placeholder="e.g. 18">

</div>

</div>

<button onclick="calculateStudyTime()">

Calculate

</button>

<!-- RESULTS -->

<div
class="result-card"
id="resultCard">

<div
class="result"
id="result">

--

</div>

<div
class="hint"
id="hint">

Fill in the fields above to begin.

</div>

</div>

</section>
