<body>

<!-- ===============================================
     APP
=============================================== -->

<div class="app">

    <!-- ===============================================
         PAGE HEADER
    =============================================== -->

    <section class="hero">

        <h1>Semester GPA Calculator</h1>

        <p>
            Add your classes below to instantly calculate your semester GPA.
        </p>

    </section>

    <!-- ===============================================
         INPUT CARD
    =============================================== -->

    <section class="card">

        <label>Class Name</label>

        <input
            id="courseName"
            type="text"
            placeholder="e.g. Calculus I">

        <label>Letter Grade</label>

        <select id="courseGrade">

            <option>A</option>
            <option>A-</option>
            <option>B+</option>
            <option>B</option>
            <option>B-</option>
            <option>C+</option>
            <option>C</option>
            <option>C-</option>
            <option>D+</option>
            <option>D</option>
            <option>F</option>

        </select>

        <label>Credits</label>

        <select id="courseCredits">

            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option selected>4</option>
            <option>5</option>
            <option>6</option>

        </select>

        <button onclick="addCourse()">

            + Add Class

        </button>

    </section>

    <!-- ===============================================
         COURSE LIST
    =============================================== -->

    <section
        id="courseList"
        class="course-list">

        <!-- JavaScript inserts cards here -->

    </section>

    <!-- ===============================================
         GPA RESULT
    =============================================== -->

    <section
        class="result-card show">

        <div class="result-label">

            Semester GPA

        </div>

        <div
            id="gpaResult"
            class="result">

            0.00

        </div>

        <div
            id="gpaHint"
            class="hint">

            Add your first class to begin.

        </div>

    </section>

    <!-- Back Button -->
    <div style="margin-top:24px; text-align:center;">
