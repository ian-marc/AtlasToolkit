<body>

<div id="navbar-container"></div>

<div class="app">

    <!-- ===========================================
         HERO
    ============================================ -->

    <section class="hero">

        <h1>

            Final Grade Calculator

        </h1>

        <p>

            Enter your current grade,
            your final exam weight,
            and the grade you'd like to finish
            the class with.

        </p>

    </section>


    <!-- ===========================================
         CALCULATOR
    ============================================ -->

    <section class="card">

        <!-- Current Grade -->

        <div class="field">

    <label>Current Grade</label>

            <div class="input-group">

                <input
                    id="current"
                    type="number"
                    placeholder="e.g. 92">

                <span>%</span>

            </div>

        </div>


        <!-- Final Weight -->

        <div class="field">

    <label>Final Exam Weight</label>

            <div class="input-group">

                <input
                    id="weight"
                    type="number"
                    placeholder="e.g. 25">

                <span>%</span>

            </div>

        </div>


        <!-- Desired Grade -->

        <div class="field">

    <label>Desired Final Grade</label>

            <div class="input-group">

                <input
                    id="desired"
                    type="number"
                    placeholder="e.g. 90">

                <span>%</span>

            </div>

        </div>


        <!-- Calculate Button -->

        <button onclick="calculate()">

            Calculate

        </button>


        <!-- Results -->

        <div
            class="result-card"
            id="resultCard">

            <div
                class="result"
                id="result">

                --

            </div>

            <div
                class="hint"
                id="hint">

                Fill in the fields above to begin.

            </div>

        </div>

    </section>
