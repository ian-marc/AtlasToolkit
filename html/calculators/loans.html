<body>

<!-- ===========================================
     HERO
=========================================== -->

<section class="hero">

<h1>

Student Loan Calculator

</h1>

<p>

Estimate your monthly payment, total interest, and overall loan cost.

</p>

</section>

<!-- ===========================================
     CALCULATOR
=========================================== -->

<section class="card">

<!-- Loan Amount -->

<div class="field">

<label>Loan Amount</label>

<div class="input-group">

<span>$</span>

<input
id="loanAmount"
type="number"
placeholder="e.g. 25000">

</div>

</div>

<!-- Interest Rate -->

<div class="field">

<label>Annual Interest Rate</label>

<div class="input-group">

<input
id="interestRate"
type="number"
step="0.01"
placeholder="e.g. 6.5">

<span>%</span>

</div>

</div>

<!-- Loan Term -->

<div class="field">

<label>Loan Term</label>

<div class="input-group">

<input
id="loanTerm"
type="number"
placeholder="e.g. 10">

<span>Years</span>

</div>

</div>

<!-- Extra Payment -->

<div class="field">

<label>Extra Monthly Payment (Optional)</label>

<div class="input-group">

<span>$</span>

<input
id="extraPayment"
type="number"
placeholder="e.g. 100">

</div>

</div>

<!-- Calculate Button -->

<button onclick="calculateLoan()">

Calculate

</button>

<!-- Results -->

<div
class="result-card"
id="resultCard">

<div
class="result"
id="result">

--

</div>

<div
class="hint"
id="hint">

Enter your loan details above to estimate your repayment.

</div>

</div>
