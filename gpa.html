<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ===============================================
         Atlas Toolkit v1.0
         File: gpa.html

         Semester GPA Calculator
         =============================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Semester GPA Calculator | Atlas Toolkit</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===============================================
     NAVIGATION BAR
=============================================== -->

<div class="navbar">

    <div class="nav-brand"
         onclick="window.location.href='index.html'">
        Atlas Toolkit
    </div>

    <div class="nav-right">

        <div class="dropdown">

            <div class="dropdown-title"
                 onclick="toggleDropdown(this)">
                Tools ▼
            </div>

            <div class="dropdown-menu">

                <div class="dropdown-item"
                     onclick="window.location.href='final.html'">
                    Final Grade Calculator
                </div>

                <div class="dropdown-item"
                     onclick="window.location.href='gpa.html'">
                    Semester GPA Calculator
                </div>

            </div>

        </div>

        <div class="dropdown">

            <div class="dropdown-title"
                 onclick="toggleDropdown(this)">
                Resources ▼
            </div>

            <div class="dropdown-menu">

                <div class="dropdown-item">
                    Study Tips
                </div>

                <div class="dropdown-item">
                    Guides
                </div>

            </div>

        </div>

    </div>

</div>

<!-- ===============================================
     APP
=============================================== -->

<div class="app">

    <!-- ===============================================
         PAGE HEADER
    =============================================== -->

    <section class="hero">

        <h1>Semester GPA Calculator</h1>

        <p>
            Add your classes below to instantly calculate your semester GPA.
        </p>

    </section>

    <!-- ===============================================
         INPUT CARD
    =============================================== -->

    <section class="card">

        <label>Class Name</label>

        <input
            id="courseName"
            type="text"
            placeholder="e.g. Calculus I">

        <label>Letter Grade</label>

        <select id="courseGrade">

            <option>A</option>
            <option>A-</option>
            <option>B+</option>
            <option>B</option>
            <option>B-</option>
            <option>C+</option>
            <option>C</option>
            <option>C-</option>
            <option>D+</option>
            <option>D</option>
            <option>F</option>

        </select>

        <label>Credits</label>

        <select id="courseCredits">

            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option selected>4</option>
            <option>5</option>
            <option>6</option>

        </select>

        <button onclick="addCourse()">

            + Add Class

        </button>

    </section>

    <!-- ===============================================
         COURSE LIST
    =============================================== -->

    <section
        id="courseList"
        class="course-list">

        <!-- JavaScript inserts cards here -->

    </section>

    <!-- ===============================================
         GPA RESULT
    =============================================== -->

    <section
        class="result-card show">

        <div class="result-label">

            Semester GPA

        </div>

        <div
            id="gpaResult"
            class="result">

            0.00

        </div>

        <div
            id="gpaHint"
            class="hint">

            Add your first class to begin.

        </div>

    </section>

    <!-- ===============================================
         FOOTER
    =============================================== -->

    <footer class="footer">

        Atlas Toolkit

        <br><br>

        Version 1.0.0

    </footer>

</div>

<!-- JavaScript -->

<script src="script.js"></script>

</body>

</html>
